apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordering-depl
  namespace: deploy-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ordering
  template:
    metadata:
      labels:
        app: ordering
    spec:
      imagePullSecrets:
        - name: harbor-secret

      containers:
        - name: ordering-container
          image: 192.168.56.1:8080/deploy-test-ordering/ordering-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          resources:
            limits:
              cpu: "250m"
              memory: "500Mi"
            requests:
              cpu: "100m"
              memory: "250Mi"
          env:
            - name: DB_HOST
              value: "mysql-master-0.mysql-master.deploy-test-data.svc.cluster.local"
            - name: DB_PW
              value: "rootpass"

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ordering-service
  namespace: deploy-test
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: ordering